info:
  name: Analyze text
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/analyze"
  body:
    type: json
    data: |-
      {
        "text": "We need to fix the login bug before Friday. John will handle the backend patch and Sarah will update the tests. We also need to notify customers about the downtime window.\n"
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response (Basic call)
    description: Successful analysis
    request:
      url: "{{baseUrl}}/analyze"
      method: POST
      body:
        type: json
        data: |-
          {
            "text": "We need to fix the login bug before Friday. John will handle the backend patch and Sarah will update the tests. We also need to notify customers about the downtime window.\n"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "summary": "The team needs to resolve a blocking auth PR before an ACME demo tomorrow, address a double-billing issue affecting 40 enterprise tenants, and file a ticket for a magic-link bug causing silent drop-offs on iOS.",
            "action_items": [
              {
                "task": "Merge the auth revamp PR before the ACME demo at 2pm tomorrow",
                "owner": "karan",
                "priority": "high"
              },
              {
                "task": "Write and run a refund script for the 40 double-billed enterprise tenants",
                "owner": "ravi",
                "priority": "high"
              },
              {
                "task": "File a bug ticket for the expired magic-link blank screen on iOS 14.x",
                "owner": "dana",
                "priority": "medium"
              }
            ]
          }
